<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add to Order</title>
  <link rel="stylesheet" href="style_counter.css" />
</head>
<body>

  <div class="product">
    <h2>Wireless Headphones</h2>
    <p>Price: Rs. 2000</p>

    <div class="controls">
      <button id="decrease">-</button>
      <span id="count">0</span>
      <button id="increase">+</button>
    </div>

    <button id="addToCart">Add to Order</button>
  </div>

  <p class="hint">
    Keyboard: (+) / (-) / R (Reset)
  </p>

  <script src="script_counter.js"></script>
</body>
</html>
